# === Custom Hyprland settings (safe from ML4W updates) ===

# Mouse scroll wheel fix - jumping / goes up then down
input {
    # Global mouse settings
    emulate_discrete_scroll = 2      # This is the most important one for erratic high-res wheels
    natural_scroll = false           # Change to true only if you want "reverse" direction like on Mac
    scroll_factor = 1.0              # Start with 1.0, lower to 0.8 or 0.5 if still too fast/jumpy

    # Touchpad (you already had this)
    touchpad {
        natural_scroll = true
    }
}

# If the above is not enough, add a device-specific block AFTER running:
# hyprctl devices
#
# device {
#     name = exact-mouse-name-here
#     emulate_discrete_scroll = 2
#     natural_scroll = false
#     scroll_factor = 1.0
# }