# Add your additional Hyprland configurations here

# App launcher
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/launcher.sh

# VSCode
bind = $mainMod, C, exec, code

# Workspace switching with SUPER + LEFT/RIGHT
bind = $mainMod, left, workspace, m-1
bind = $mainMod, right, workspace, m+1

# Move window to workspace with SUPER + ALT + LEFT/RIGHT
bind = $mainMod ALT, left, movetoworkspace, r-1
bind = $mainMod ALT, right, movetoworkspace, r+1

# Fix reversed scroll
input {
    touchpad {
        natural_scroll = false
    }
}
