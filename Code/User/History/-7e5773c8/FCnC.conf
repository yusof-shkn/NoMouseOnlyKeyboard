# App launcher
bind = $mainMod, D, exec, ~/.config/hypr/scripts/launcher.sh

# VSCode
bind = $mainMod, C, exec, code

# Browser (replaces waypaper random)
bind = $mainMod, W, exec, ~/.config/ml4w/settings/browser.sh

# Workspace switching — visits empty workspaces too
bind = $mainMod, right, workspace, r+1
bind = $mainMod, left, workspace, r-1

# Explicit number bindings (for QWERTY or as fallback)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Keep swap on Super+Ctrl+Arrow (or similar):
bind = $mainMod CTRL, left, swapwindow, l
bind = $mainMod CTRL, right, swapwindow, r

# Add move-to-workspace on Super+Alt+Arrow:
bind = $mainMod ALT, left, movetoworkspace, r-1
bind = $mainMod ALT, right, movetoworkspace, r+1

# Lock screen
bind = $mainMod, L, exec, hyprlock

# === Custom Hyprland settings (safe from ML4W updates) ===

# Mouse scroll fix for your cheap wireless mouse (hs6209)
input {
    natural_scroll = false
    scroll_factor = 1.0
}

device {
    name = hs6209-2.4g-wireless-receiver-mouse
    natural_scroll = false
    scroll_factor = 0.5
    # You can try lowering this if still jumpy: 0.7 / 0.5 / 0.3
}