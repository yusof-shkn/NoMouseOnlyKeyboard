# -----------------------------------------------------
# Custom Key bindings
# -----------------------------------------------------

$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/ml4w/scripts

# App launcher
bind = $mainMod, D, exec, ~/.config/hypr/scripts/launcher.sh

# VSCode
bind = $mainMod, C, exec, code

# Browser
bind = $mainMod, W, exec, ~/.config/ml4w/settings/browser.sh

# Lock screen
bind = $mainMod, L, exec, hyprlock

# -------------------------------------------------------
# Window switching
# -------------------------------------------------------

# Alt+Space — cycle between windows
bind = ALT, Space, cyclenext
bind = ALT, Space, bringactivetotop

# -------------------------------------------------------
# Window resizing
# -------------------------------------------------------

# Alt+- — make active window smaller
# Alt+= — make active window bigger
binde = ALT, minus, resizeactive, -50 -50
binde = ALT, equal, resizeactive, 50 50

# -------------------------------------------------------
# Scrolling
# -------------------------------------------------------

# Alt+I — scroll upm
# Alt+K — scroll down
binde = ALT, i, sendshortcut, , Up, activewindow
binde = ALT, k, sendshortcut, , Down, activewindow
binde = ALT, l, sendshortcut, , Right, activewindow
binde = ALT, j, sendshortcut, , Left, activewindow

# -------------------------------------------------------
# Window swapping
# -------------------------------------------------------

# Alt+U — swap with next window (works from either side)
bind = ALT, h, swapnext

# Alt+O — pin window (keep on all workspaces)
bind = ALT, y, pin

# Super+Ctrl+Arrow — move window in arrow direction
bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r

# -------------------------------------------------------
# Workspace switching
# -------------------------------------------------------

# Alt+J — previous workspace
# Alt+L — next workspace
bind = ALT, u, workspace, r-1
bind = ALT, o, workspace, r+1

# Super+Number — jump to workspace by number
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# -------------------------------------------------------
# Move window to workspace
# -------------------------------------------------------

# Alt+Shift+J — move window to previous workspace
# Alt+Shift+L — move window to next workspace
bind = ALT SHIFT, u, movetoworkspace, r-1
bind = ALT SHIFT, o, movetoworkspace, r+1

# Super+Alpt+Arrow — move window to workspace in arrow direction
bind = $mainMod ALT, left,  movetoworkspace, r-1
bind = $mainMod ALT, right, movetoworkspace, r+1

# -------------------------------------------------------
# Keyboard pointer (wl-kbptr)
# -------------------------------------------------------

# Alt+M — floating mode (auto-detect targets)
# after
bind = ALT, M, exec, ~/.config/hypr/scripts/wl-kbptr-toggle.sh

# Alt+N — tile grid mode
bind = ALT, N, exec, wl-kbptr -o modes=tile,bisect
bind = $mainMod, P, exec, ~/.config/hypr/scripts/screenshot.sh
# -------------------------------------------------------
# Input settings
# -------------------------------------------------------

input {
    touchpad {
        natural_scroll = true
    }
}


bind = $mainMod, F1, exec, google-chrome-stable --user-data-dir="/tmp/chrome-user1" --new-window
bind = $mainMod, F2, exec, google-chrome-stable --user-data-dir="/tmp/chrome-user2" --new-window
bind = $mainMod, F3, exec, google-chrome-stable --user-data-dir="/tmp/chrome-user3" --new-window

bind = ALT, semicolon, exec, wlrctl pointer click
bind = ALT, apostrophe, exec, wlrctl pointer click right