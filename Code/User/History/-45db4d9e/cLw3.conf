# -----------------------------------------------------
# Custom Key bindings
# -----------------------------------------------------

$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/ml4w/scripts

# App launcher
bind = $mainMod, D, exec, ~/.config/hypr/scripts/launcher.sh

# VSCode
bind = $mainMod, C, exec, code

# Browser
bind = $mainMod, W, exec, ~/.config/ml4w/settings/browser.sh

# Lock screen
bind = $mainMod, L, exec, hyprlock
# Alt+P — snap focus to scrcpy/phone window
bind = $mainMod, O, exec, ~/.config/hypr/scripts/toggle-phone-otg.sh
# Position scrcpy window bottom-left and keep it floating small
windowrulev2 = float, class:^(scrcpy)$
windowrulev2 = size 160 120, class:^(scrcpy)$
windowrulev2 = move 0 9999, class:^(scrcpy)$

# Alt+P — snap focus to phone window
bind = ALT, p, focuswindow, class:^(scrcpy)$
# Start cursor daemon on login
exec-once = sleep 3 && python3 ~/.config/hypr/scripts/cursor-daemon.py

# -------------------------------------------------------
# Window switching
# -------------------------------------------------------

# Alt+Space — cycle between windows
bind = ALT, Space, cyclenext
bind = ALT, Space, bringactivetotop

# -------------------------------------------------------
# Window resizing
# -------------------------------------------------------

# Alt+- — make active window smaller
# Alt+= — make active window bigger
binde = ALT, minus, resizeactive, -50 -50
binde = ALT, equal, resizeactive, 50 50

# -------------------------------------------------------
# Cursor movement (keyboard mouse control)
# -------------------------------------------------------

# Alt+I — move cursor up
# Alt+K — move cursor down
# Alt+J — move cursor left
# Alt+L — move cursor right
binde = ALT, i, exec, ~/.config/hypr/scripts/cursor-send.sh press:up
bindr = ALT, i, exec, ~/.config/hypr/scripts/cursor-send.sh release:up
binde = ALT, k, exec, ~/.config/hypr/scripts/cursor-send.sh press:down
bindr = ALT, k, exec, ~/.config/hypr/scripts/cursor-send.sh release:down
binde = ALT, j, exec, ~/.config/hypr/scripts/cursor-send.sh press:left
bindr = ALT, j, exec, ~/.config/hypr/scripts/cursor-send.sh release:left
binde = ALT, l, exec, ~/.config/hypr/scripts/cursor-send.sh press:right
bindr = ALT, l, exec, ~/.config/hypr/scripts/cursor-send.sh release:right

# Alt+W — hold left click (hold and move cursor to drag)
binde = ALT, w, exec, ~/.config/hypr/scripts/cursor-send.sh press:lclick
bindr = ALT, w, exec, ~/.config/hypr/scripts/cursor-send.sh release:lclick

# Alt+R — hold right click
binde = ALT, r, exec, ~/.config/hypr/scripts/cursor-send.sh press:rclick
bindr = ALT, r, exec, ~/.config/hypr/scripts/cursor-send.sh release:rclick

# -------------------------------------------------------
# Scrolling
# -------------------------------------------------------

# Alt+E — scroll up
# Alt+D — scroll down
# Alt+F — scroll right
# Alt+S — scroll left
binde = ALT, e, sendshortcut, , Up, activewindow
binde = ALT, d, sendshortcut, , Down, activewindow
binde = ALT, f, sendshortcut, , Right, activewindow
binde = ALT, s, sendshortcut, , Left, activewindow

# -------------------------------------------------------
# Window swapping
# -------------------------------------------------------

# Alt+H — swap with next window
bind = ALT, h, swapnext

# Alt+Y — pin window (keep on all workspaces)
bind = ALT, y, pin

# Super+Ctrl+Arrow — move window in arrow direction
bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r

# -------------------------------------------------------
# Workspace switching
# -------------------------------------------------------

# Alt+U — previous workspace
# Alt+O — next workspace
bind = ALT, u, workspace, r-1
bind = ALT, o, workspace, r+1

# Super+Number — jump to workspace by number
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# -------------------------------------------------------
# Move window to workspace
# -------------------------------------------------------

# Alt+Shift+U — move window to previous workspace
# Alt+Shift+O — move window to next workspace
bind = ALT SHIFT, u, movetoworkspace, r-1
bind = ALT SHIFT, o, movetoworkspace, r+1

# Super+Alt+Arrow — move window to workspace in arrow direction
bind = $mainMod ALT, left,  movetoworkspace, r-1
bind = $mainMod ALT, right, movetoworkspace, r+1

# -------------------------------------------------------
# Keyboard pointer (wl-kbptr)
# -------------------------------------------------------

# Alt+M — floating mode (auto-detect targets)
bind = ALT, M, exec, ~/.config/hypr/scripts/wl-kbptr-toggle.sh


# Screenshot
bind = $mainMod, P, exec, ~/.config/hypr/scripts/screenshot.sh

# -------------------------------------------------------
# Input settings
# -------------------------------------------------------

input {
    touchpad {
        natural_scroll = true
    }
}

# -------------------------------------------------------
# Chrome instances
# -------------------------------------------------------

bind = $mainMod, F1, exec, google-chrome-stable --user-data-dir="/tmp/chrome-user1" --new-window
bind = $mainMod, F2, exec, google-chrome-stable --user-data-dir="/tmp/chrome-user2" --new-window
bind = $mainMod, F3, exec, google-chrome-stable --user-data-dir="/tmp/chrome-user3" --new-windowj