# ╔══════════════════════════════════════════════════════════╗
# ║        BlazinLock Minimal Modern - hyprlock.conf         ║
# ║        Save to: ~/.config/hypr/hyprlock.conf             ║
# ╚══════════════════════════════════════════════════════════╝

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# ── Background (screenshot blur) ────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 1.0
    brightness = 0.6
    vibrancy = 0.2
}

# ── Time (giant, center) ────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<span font_family='JetBrains Mono' weight='800' size='180000'>$(date '+%H:%M')</span>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 1
    
    position = 0, 120
    halign = center
    valign = center
    
    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(0, 0, 0, 0.8)
}

# ── Date ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<span font_family='JetBrains Mono' weight='500' size='26000'>$(date '+%A, %B %d')</span>"
    color = rgba(255, 255, 255, 0.85)
    font_size = 1
    
    position = 0, 30
    halign = center
    valign = center
    
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.7)
}

# ── Password Input ──────────────────────────────────────────
input-field {
    monitor =
    size = 460, 80
    outline_thickness = 0
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1
    
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(30, 30, 46, 0.35)
    font_color = rgba(255, 255, 255, 1.0)
    font_family = JetBrains Mono
    
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff80">Enter password</span>
    
    hide_input = false
    rounding = 20
    
    check_color = rgba(166, 227, 161, 0.8)
    fail_color = rgba(243, 139, 168, 0.9)
    fail_text = <span foreground="##f38ba8">✗ Incorrect</span>
    fail_transition = 300
    
    position = 0, -120
    halign = center
    valign = center
    
    shadow_passes = 3
    shadow_size = 15
    shadow_color = rgba(0, 0, 0, 0.6)
}

# ── Battery (top right) ─────────────────────────────────────
label {
    monitor =
    text = cmd[update:10000] bash ~/.config/hypr/hyprlock/hyprlock.sh -bat
    color = rgba(255, 255, 255, 0.9)
    font_size = 18
    font_family = JetBrains Mono Medium
    
    position = -50, -50
    halign = right
    valign = top
    
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.7)
}