# Minimal Modern Hyprlock Config
# Save to: ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

# Background - screenshot with blur
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    brightness = 0.6
}

# Time - giant clock
label {
    monitor =
    text = cmd[update:1000] date '+%H:%M'
    color = rgba(255, 255, 255, 1.0)
    font_size = 150
    font_family = JetBrainsMono Nerd Font ExtraBold
    
    position = 0, 100
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] date '+%A, %B %d'
    color = rgba(255, 255, 255, 0.8)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Medium
    
    position = 0, 20
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 450, 75
    outline_thickness = 0
    
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(30, 30, 46, 0.4)
    font_color = rgba(255, 255, 255, 1.0)
    
    placeholder_text = Enter password
    
    rounding = 18
    
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    
    position = 0, -100
    halign = center
    valign = center
}

# Battery
label {
    monitor =
    text = cmd[update:10000] cat /sys/class/power_supply/BAT*/capacity
    color = rgba(255, 255, 255, 0.9)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    
    position = -40, -40
    halign = right
    valign = top
}