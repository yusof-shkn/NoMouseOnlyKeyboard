# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Hyprlock config — modified by user
# Clock: top center | Input: glassmorphism | Blur: current | Colors: wallust

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

# ---- BACKGROUND ----
background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current

    color = rgb(0,0,0)

    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# ---- DATE — top center ----
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = $color13
    font_size = 36
    font_family = Victor Mono Bold Italic
    position = 0, -40                   # CHANGED: moved to top center
    halign = center
    valign = top
}

# ---- TIME — top center, below date ----
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = $color8
    font_size = 120                     # CHANGED: slightly smaller to fit top area nicely
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -90                   # CHANGED: below date at top
    halign = center
    valign = top
}

# ---- USER — center of screen ----
label {
    monitor =
    text =   $USER
    color = $color9
    font_size = 32
    font_family = Victor Mono Bold Oblique
    position = 0, 60                    # CHANGED: sits above input box in center
    halign = center
    valign = center
}

# ---- INPUT FIELD — glassmorphism style, center ----
input-field {
    monitor =
    size = 320, 60                      # CHANGED: wider, slimmer for glass look
    outline_thickness = 1               # CHANGED: thinner outline for glass feel
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.15)   # CHANGED: semi-transparent white border
    inner_color = rgba(255, 255, 255, 0.08)   # CHANGED: very transparent glass fill
    capslock_color = rgba(255, 255, 255, 0.9)
    font_color = $color13
    fade_on_empty = false
    font_family = Victor Mono Bold Oblique
    rounding = 16                       # CHANGED: rounded corners for glass effect
    shadow_passes = 2                   # CHANGED: soft shadow for depth
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.4)
    placeholder_text = <i><span foreground="##ffffff99">🔒 Type Password</span></i>
    hide_input = false
    position = 0, 0                     # CHANGED: centered on screen
    halign = center
    valign = center
}

# ---- KEYBOARD LAYOUT — below input ----
label {
    monitor =
    text = $LAYOUT
    color = $color8
    font_size = 16
    font_family = Victor Mono Bold Oblique
    position = 0, -70                   # CHANGED: below input box
    halign = center
    valign = center
}

# ---- UPTIME — bottom right ----
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = $color8
    font_size = 18
    font_family = Victor Mono Bold Oblique
    position = -20, 20
    halign = right
    valign = bottom
}

# ---- BATTERY — bottom right above uptime ----
label {
    monitor =
    text = cmd[update:1000] echo "<b> "$($Scripts/Battery.sh)" </b>"
    color = $color8
    font_size = 18
    font_family = Victor Mono Bold Oblique
    position = -20, 50
    halign = right
    valign = bottom
}

# ---- WEATHER — bottom left ----
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache"
    color = $color8
    font_size = 18
    font_family = Victor Mono Bold Oblique
    position = 20, 20
    halign = left
    valign = bottom
}