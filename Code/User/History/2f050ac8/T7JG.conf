general {
    ignore_empty_input = true
    text_trim = false
}

background {
    color = rgba(222222FF)
    path = screenshot
    blur_size = 2
    blur_passes = 3
    zindex = -1
}

# INPUT FIELD (Password)
input-field {
    monitor =
    size = 230, 50
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(22222299)
    fail_color = rgba(22222299)
    inner_color = rgba(255, 255, 255, 0.8)
    font_color = rgba(34, 34, 34)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Mono
    placeholder_text = <i><span foreground="##222222">Input Password...</span></i>
    hide_input = false
    position = 0, -220
    halign = center
    valign = center
    zindex = 10
}

# CLOCK/TIME
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1)
    font_size = 90
    shadow_passes = 3
    shadow_boost = 0.5
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, 100
    halign = center
    valign = top
    zindex = 3
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 24
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, 50
    halign = center
    valign = top
    zindex = 3
}

# BATTERY
label {
    monitor =
    text = cmd[update:10000] ~/.config/hypr/hyprlock/blazinscripts.sh -bat
    color = rgba(255, 255, 255, 1)
    font_size = 16
    font_family = JetBrains Mono Nerd Font Mono
    position = -30, -30
    halign = right
    valign = top
    zindex = 5
}