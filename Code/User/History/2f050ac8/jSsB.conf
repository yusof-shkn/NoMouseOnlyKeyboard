# Minimal modern lock screen — screenshot background

source = colors.conf

general {
    ignore_empty_input = true
    hide_cursor         = true
}

# ── Background ────────────────────────────────────────────────────────────────
# Grabs a live screenshot of the screen, then blurs + dims it
background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 2
    brightness  = 0.6
    contrast    = 0.9
    vibrancy    = 0.15
}

# ── Clock ─────────────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(ffffffff)
    font_size   = 96
    font_family = Fira Sans Thin
    position    = 0, 120
    halign      = center
    valign      = center
    shadow_passes = 3
    shadow_size   = 8
    shadow_color  = rgba(00000066)
}

# ── Date ──────────────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color       = rgba(ffffffcc)
    font_size   = 18
    font_family = Fira Sans Light
    position    = 0, 52
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 6
    shadow_color  = rgba(00000055)
}

# ── Password input ────────────────────────────────────────────────────────────
input-field {
    monitor         =
    size            = 280, 52
    rounding        = 26          # pill shape

    inner_color     = rgba(ffffff18)   # frosted glass fill
    outer_color     = rgba(ffffff30)   # subtle border
    outline_thickness = 1

    font_color      = rgba(ffffffff)
    font_family     = Fira Sans Regular

    dots_size       = 0.28
    dots_spacing    = 0.20
    dots_center     = true
    dots_rounding   = -1

    placeholder_text = <span foreground="##ffffffaa"><i>enter password</i></span>
    fade_on_empty   = true
    fade_timeout    = 1500

    check_color     = $primary
    fail_color      = $error
    fail_text       = <i>$FAIL ($ATTEMPTS)</i>

    capslock_color  = -1
    hide_input      = false

    position        = 0, -60
    halign          = center
    valign          = center

    shadow_passes   = 4
    shadow_size     = 12
    shadow_color    = rgba(00000044)
    shadow_boost    = 1.2
}