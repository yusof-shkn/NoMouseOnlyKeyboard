# ╔══════════════════════════════════════════════════════════╗
# ║            hyprlock.conf  —  minimal modern              ║
# ║            Screenshot blur · Clock · Password            ║
# ╚══════════════════════════════════════════════════════════╝

# ── General ─────────────────────────────────────────────────
general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# ── Background (screenshot with heavy blur) ─────────────────
background {
    monitor =
    path = screenshot  # Takes screenshot of current desktop
    
    # Heavy blur for modern frosted glass effect
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 1.0
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Time (huge, center) ─────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgb(255, 255, 255)
    font_size = 140
    font_family = JetBrainsMono Nerd Font ExtraBold
    
    position = 0, 120
    halign = center
    valign = center
    
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.7)
}

# ── Date (subtle, below time) ───────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = rgba(255, 255, 255, 0.8)
    font_size = 22
    font_family = JetBrainsMono Nerd Font Medium
    
    position = 0, 40
    halign = center
    valign = center
    
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.6)
}

# ── Password Input Field ────────────────────────────────────
input-field {
    monitor =
    size = 400, 70
    outline_thickness = 0
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1
    
    # Frosted glass effect
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(30, 30, 46, 0.3)
    font_color = rgb(255, 255, 255)
    
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##ffffff99">Enter password</span>
    
    hide_input = false
    rounding = 16
    
    check_color = rgba(166, 227, 161, 0.8)   # green
    fail_color = rgba(243, 139, 168, 0.9)    # red
    fail_text = <span foreground="##f38ba8">✗ Incorrect</span>
    fail_transition = 300
    
    capslock_color = rgba(250, 179, 135, 0.8)
    numlock_color = -1
    bothlock_color = -1
    
    invert_numlock = false
    swap_font_color = false
    
    position = 0, -120
    halign = center
    valign = center
    
    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ── Battery (top right corner) ──────────────────────────────
label {
    monitor =
    text = cmd[update:10000] echo " $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo '100')%"
    color = rgba(255, 255, 255, 0.9)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Medium
    
    position = -40, -40
    halign = right
    valign = top
    
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
}