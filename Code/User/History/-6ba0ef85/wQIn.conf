# ╔══════════════════════════════════════════════════════════════╗
# ║              kitty.conf — yusof_0090's terminal              ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Font ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Regular
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        12.0
modify_font      cell_height  110%
modify_font      underline_position    2
modify_font      underline_thickness   1px

# ── Cursor ──────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0
cursor_stop_blinking_after 0

# ── Scrollback ──────────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ───────────────────────────────────────────────────────
mouse_hide_wait    2.0
# url_color          #89b4fa
url_style          curly
open_url_with      default
detect_urls        yes
copy_on_select     yes

# ── Performance ─────────────────────────────────────────────────
repaint_delay      8
input_delay        2
sync_to_monitor    yes

# ── Window ──────────────────────────────────────────────────────
remember_window_size   yes
initial_window_width   1000
initial_window_height  600

window_padding_width   14 18

# No title bar chrome — let Hyprland handle decorations
hide_window_decorations no
confirm_os_window_close 0

# ── Tabs ────────────────────────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1
tab_bar_margin_width    0
tab_bar_margin_height   4 4

active_tab_font_style   bold
inactive_tab_font_style normal

# ── Colorscheme : Catppuccin Mocha ──────────────────────────────
# Base palette
# background            #1e1e2e
# foreground            #ffffff
# selection_background  #45475a
# selection_foreground  #ffffff
# cursor                #f5e0dc
# cursor_text_color     #1e1e2e

# URL + active border
# url_color          #89b4fa
# active_border_color   #b4befe
# inactive_border_color #45475a
# bell_border_color     #f38ba8

# Dim inactive window slightly
inactive_text_alpha 0.7

# Tab bar
# active_tab_background   #cba6f7
# active_tab_foreground   #1e1e2e
# inactive_tab_background #313244
# inactive_tab_foreground #cdd6f4
# tab_bar_background      #181825

# Normal colours
# color0   #45475a
# color1   #f38ba8
# color2   #a6e3a1
# color3   #f9e2af
# color4   #89b4fa
# color5   #f5c2e7
# color6   #94e2d5
# color7   #ffffff

# Bright colours
# color8   #585b70
# color9   #f38ba8
# color10  #a6e3a1
# color11  #f9e2af
# color12  #89b4fa
# color13  #f5c2e7
# color14  #94e2d5
# color15  #ffffff

# ── Key bindings ────────────────────────────────────────────────
# Clear defaults so only our bindings exist
clear_all_shortcuts no

# Font size
map ctrl+shift+equal     increase_font_size
map ctrl+shift+minus     decrease_font_size
map ctrl+shift+backspace restore_font_size

# Clipboard
map ctrl+shift+c         copy_to_clipboard
map ctrl+shift+v         paste_from_clipboard

# Scrollback
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end

# Tabs
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  prev_tab
map ctrl+1           goto_tab 1
map ctrl+2           goto_tab 2
map ctrl+3           goto_tab 3
map ctrl+4           goto_tab 4
map ctrl+5           goto_tab 5

# Windows / splits
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window

# Reload config
map ctrl+shift+F5    load_config_file

# ── Miscellaneous ───────────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.1
# visual_bell_color     #f38ba8

allow_hyperlinks yes
shell_integration enabled

# ── Transparency / blur (works with Hyprland) ───────────────────
background_opacity         0.92
background_blur            20
dynamic_background_opacity yes
map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default


# BEGIN_KITTY_THEME
# Yorumi Abyss
include current-theme.conf
# END_KITTY_THEME