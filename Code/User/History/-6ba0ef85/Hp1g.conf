# ╔══════════════════════════════════════════════════════════════╗
# ║              kitty.conf — yusof_0090's terminal              ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Font ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Regular
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        12.0
modify_font      cell_height  110%
modify_font      underline_position    2
modify_font      underline_thickness   1px

# ── Cursor ──────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0
cursor_stop_blinking_after 0

# ── Scrollback ──────────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ───────────────────────────────────────────────────────
mouse_hide_wait    2.0
url_style          curly
open_url_with      default
detect_urls        yes
copy_on_select     yes

# ── Performance ─────────────────────────────────────────────────
repaint_delay      8
input_delay        2
sync_to_monitor    yes

# ── Window ──────────────────────────────────────────────────────
remember_window_size   yes
initial_window_width   1000
initial_window_height  600

window_padding_width   16 20

hide_window_decorations no
confirm_os_window_close 0

# ── Tabs ────────────────────────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           fade
tab_bar_min_tabs        1
tab_bar_margin_width    0
tab_bar_margin_height   6 0
tab_fade                0.25 0.5 0.75 1

active_tab_font_style   bold
inactive_tab_font_style normal
tab_title_template      " {title} "

# ── Inactive window ─────────────────────────────────────────────
inactive_text_alpha 0.6

# ── Transparency / blur ─────────────────────────────────────────
background_opacity         0.88
background_blur            24
dynamic_background_opacity yes
map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default

# ── Misc ────────────────────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.0
allow_hyperlinks      yes
shell_integration     enabled

# ── Key bindings ────────────────────────────────────────────────
clear_all_shortcuts no

map ctrl+shift+equal     increase_font_size
map ctrl+shift+minus     decrease_font_size
map ctrl+shift+backspace restore_font_size

map ctrl+shift+c         copy_to_clipboard
map ctrl+shift+v         paste_from_clipboard

map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end

map ctrl+shift+t         new_tab_with_cwd
map ctrl+shift+w         close_tab
map ctrl+shift+right     next_tab
map ctrl+shift+left      prev_tab
map ctrl+1               goto_tab 1
map ctrl+2               goto_tab 2
map ctrl+3               goto_tab 3
map ctrl+4               goto_tab 4
map ctrl+5               goto_tab 5

map ctrl+shift+enter     new_window_with_cwd
map ctrl+shift+]         next_window
map ctrl+shift+[         previous_window

map ctrl+shift+F5        load_config_file

# ── Wallust colors (JaKooLit — auto updated on wallpaper change) ─
# BEGIN_KITTY_THEME
# Wallust
include kitty-themes/01-Wallust.conf
# END_KITTY_THEME